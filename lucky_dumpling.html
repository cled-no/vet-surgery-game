<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Dumpling 🥟</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(160deg, #ffe5c2 0%, #ffc999 50%, #ffb085 100%);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    color: #7B3F00;
    text-shadow: 3px 3px 0 #f4a56a, 5px 5px 0 rgba(0,0,0,0.08);
    margin-bottom: 4px;
    text-align: center;
    letter-spacing: 1px;
  }

  #subtitle {
    font-size: 1.05rem;
    color: #a0540e;
    font-weight: 800;
    margin-bottom: 18px;
    text-align: center;
  }

  #counter {
    font-size: 1rem;
    font-weight: 800;
    color: #7B3F00;
    background: rgba(255,255,255,0.55);
    padding: 6px 20px;
    border-radius: 50px;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  /* ---- SCREENS ---- */
  #start-screen {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    justify-content: center;
    gap: 24px;
    width: 100%;
    max-width: 900px;
  }

  #steamer-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  #result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  /* ---- STEAMER CONTAINER ---- */
  #steamer-wrap {
    cursor: pointer;
    position: relative;
    width: 300px;
    height: 330px;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 12px 24px rgba(100,50,0,0.22));
    transition: transform 0.12s;
  }
  #steamer-wrap:hover { transform: scale(1.03); }
  #steamer-wrap:active { transform: scale(0.97); }

  /* Steam wisps */
  .steam-wisp {
    position: absolute;
    top: 30px;
    width: 10px;
    height: 50px;
    border-radius: 50%;
    background: rgba(255,255,255,0.75);
    filter: blur(5px);
    animation: steamrise 2.2s ease-in-out infinite;
    opacity: 0;
    pointer-events: none;
  }
  .steam-wisp:nth-child(1) { left: 105px; animation-delay: 0s; }
  .steam-wisp:nth-child(2) { left: 140px; animation-delay: 0.55s; }
  .steam-wisp:nth-child(3) { left: 175px; animation-delay: 1.1s; }

  @keyframes steamrise {
    0%   { opacity: 0; transform: translateY(0) scaleX(1); }
    25%  { opacity: 0.9; }
    100% { opacity: 0; transform: translateY(-55px) scaleX(2); }
  }

  /* Lid open animation */
  #lid-group {
    transform-origin: 150px 160px;
    transition: transform 0.65s cubic-bezier(0.34, 1.4, 0.64, 1);
  }
  #lid-group.open {
    transform: rotate(-42deg) translate(-55px, -45px);
  }

  /* Tap hint pulse */
  #tap-hint {
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    color: #a0540e;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.55; transform: scale(0.96); }
  }

  /* ---- RESULT ---- */
  #result-dumpling-wrap {
    position: relative;
    width: 220px;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #result-dumpling-svg {
    filter: drop-shadow(0 8px 18px rgba(0,0,0,0.2));
  }

  .dumpling-reveal {
    animation: bouncein 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes bouncein {
    0%   { transform: scale(0) translateY(30px); opacity: 0; }
    60%  { transform: scale(1.18) translateY(-10px); opacity: 1; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  @keyframes glimmer {
    0%, 100% { filter: drop-shadow(0 8px 18px rgba(0,0,0,0.2)) brightness(1) saturate(1); }
    50%       { filter: drop-shadow(0 8px 28px rgba(255,220,50,0.6)) brightness(1.3) saturate(1.6); }
  }
  .glow-gold  { animation: bouncein 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards, glimmer 1s ease-in-out 0.7s infinite; }

  @keyframes glimmerMagic {
    0%, 100% { filter: drop-shadow(0 8px 18px rgba(0,0,0,0.2)) brightness(1); }
    33%       { filter: drop-shadow(0 0 24px #44C8FF) brightness(1.25); }
    66%       { filter: drop-shadow(0 0 24px #FFE033) brightness(1.25); }
  }
  .glow-magic { animation: bouncein 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards, glimmerMagic 1.2s ease-in-out 0.7s infinite; }

  @keyframes glimmerUniverse {
    0%, 100% { filter: drop-shadow(0 8px 18px rgba(0,0,0,0.25)) brightness(1); }
    50%       { filter: drop-shadow(0 0 30px #7B2FBE) brightness(1.2) saturate(1.4); }
  }
  .glow-universe { animation: bouncein 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards, glimmerUniverse 1.4s ease-in-out 0.7s infinite; }

  #dumpling-name {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: #5a2d00;
    text-shadow: 2px 2px 0 rgba(255,255,255,0.5);
    text-align: center;
  }

  #rarity-badge {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    padding: 8px 28px;
    border-radius: 50px;
    color: white;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.35);
    box-shadow: 0 4px 14px rgba(0,0,0,0.22);
  }

  /* Buttons */
  .btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    padding: 14px 38px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.13s, box-shadow 0.13s;
    box-shadow: 0 6px 0 rgba(0,0,0,0.18);
    color: white;
    letter-spacing: 0.5px;
  }
  .btn:hover  { transform: translateY(-3px); box-shadow: 0 9px 0 rgba(0,0,0,0.18); }
  .btn:active { transform: translateY(3px);  box-shadow: 0 2px 0 rgba(0,0,0,0.18); }

  #try-again-btn {
    background: linear-gradient(135deg, #ff9a56 0%, #ff5e3a 100%);
  }

  /* ---- DUMPLING TABLE ---- */
  #dumpling-table-wrap {
    flex: 1;
    min-width: 240px;
    max-width: 340px;
    background: rgba(255,255,255,0.55);
    border-radius: 20px;
    padding: 16px 18px 10px;
    box-shadow: 0 4px 18px rgba(100,50,0,0.10);
    align-self: center;
  }

  #dumpling-table-wrap h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.25rem;
    color: #7B3F00;
    text-align: center;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  #dumpling-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 5px;
  }

  #dumpling-table thead th {
    font-family: 'Fredoka One', cursive;
    font-size: 0.82rem;
    color: #a0540e;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 2px 8px 6px;
    text-align: left;
  }
  #dumpling-table thead th:last-child { text-align: right; }

  #dumpling-table tbody tr {
    background: rgba(255,255,255,0.65);
    border-radius: 12px;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  #dumpling-table tbody tr:hover {
    transform: scale(1.015);
    box-shadow: 0 3px 10px rgba(0,0,0,0.09);
  }

  #dumpling-table td {
    padding: 5px 8px;
    vertical-align: middle;
  }
  #dumpling-table td:first-child { border-radius: 12px 0 0 12px; padding-left: 10px; }
  #dumpling-table td:last-child  { border-radius: 0 12px 12px 0; padding-right: 10px; text-align: right; }

  .dt-icon svg { display: block; }

  .dt-name {
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem;
    color: #5a2d00;
  }

  .dt-badge {
    font-family: 'Fredoka One', cursive;
    font-size: 0.78rem;
    padding: 3px 10px;
    border-radius: 50px;
    color: white;
    display: inline-block;
    text-shadow: 0 1px 2px rgba(0,0,0,0.25);
  }

  .dt-chance {
    font-family: 'Fredoka One', cursive;
    font-size: 0.88rem;
    color: #a0540e;
    white-space: nowrap;
  }

  /* Particle canvas */
  #fx-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 99;
  }
</style>
</head>
<body>

<h1>🥟 Lucky Dumpling!</h1>
<p id="subtitle">Tap the steamer — what will you get?</p>
<div id="counter">Opens: <span id="open-count">0</span></div>

<!-- ======= START SCREEN ======= -->
<div id="start-screen">
  <div id="steamer-col">
  <div id="steamer-wrap" onclick="openSteamer()">
    <div class="steam-wisp"></div>
    <div class="steam-wisp"></div>
    <div class="steam-wisp"></div>

    <svg id="steamer-svg" width="300" height="310" viewBox="0 0 300 310"
         xmlns="http://www.w3.org/2000/svg">

      <!-- ===== BODY ===== -->
      <!-- drop shadow -->
      <ellipse cx="150" cy="300" rx="108" ry="12" fill="rgba(0,0,0,0.14)"/>

      <!-- outer wall -->
      <rect x="42" y="180" width="216" height="108" rx="22" fill="#C8874A"/>
      <!-- wall highlight band -->
      <rect x="42" y="180" width="216" height="32" rx="22" fill="#DEAF7A" opacity="0.55"/>
      <!-- wall shade -->
      <rect x="42" y="262" width="216" height="26" rx="22" fill="#A06428"/>

      <!-- bamboo slat lines vertical -->
      <line x1="90"  y1="180" x2="90"  y2="288" stroke="#A06428" stroke-width="2.5" stroke-dasharray="5,5" opacity="0.65"/>
      <line x1="120" y1="180" x2="120" y2="288" stroke="#A06428" stroke-width="2.5" stroke-dasharray="5,5" opacity="0.65"/>
      <line x1="150" y1="180" x2="150" y2="288" stroke="#A06428" stroke-width="2.5" stroke-dasharray="5,5" opacity="0.65"/>
      <line x1="180" y1="180" x2="180" y2="288" stroke="#A06428" stroke-width="2.5" stroke-dasharray="5,5" opacity="0.65"/>
      <line x1="210" y1="180" x2="210" y2="288" stroke="#A06428" stroke-width="2.5" stroke-dasharray="5,5" opacity="0.65"/>

      <!-- horizontal ring band middle -->
      <rect x="42" y="222" width="216" height="8" rx="4" fill="#A06428" opacity="0.4"/>

      <!-- bottom rim -->
      <rect x="36" y="276" width="228" height="18" rx="9" fill="#A06428"/>

      <!-- top rim of body (where lid sits) -->
      <rect x="36" y="172" width="228" height="16" rx="8" fill="#A06428"/>
      <ellipse cx="150" cy="172" rx="114" ry="10" fill="#BF7835"/>

      <!-- ===== LID (animated group) ===== -->
      <g id="lid-group">
        <!-- lid rim base -->
        <ellipse cx="150" cy="162" rx="114" ry="13" fill="#A06428"/>
        <!-- lid dome outer -->
        <ellipse cx="150" cy="148" rx="111" ry="26" fill="#C8874A"/>
        <!-- lid dome top -->
        <ellipse cx="150" cy="132" rx="104" ry="34" fill="#DEAF7A"/>

        <!-- woven crosshatch on lid -->
        <!-- diagonal NW-SE -->
        <line x1="58"  y1="112" x2="108" y2="162" stroke="#A06428" stroke-width="2.2" opacity="0.6"/>
        <line x1="83"  y1="104" x2="138" y2="159" stroke="#A06428" stroke-width="2.2" opacity="0.6"/>
        <line x1="110" y1="100" x2="162" y2="152" stroke="#A06428" stroke-width="2.2" opacity="0.6"/>
        <line x1="136" y1="100" x2="186" y2="150" stroke="#A06428" stroke-width="2.2" opacity="0.6"/>
        <line x1="160" y1="102" x2="208" y2="150" stroke="#A06428" stroke-width="2.2" opacity="0.6"/>
        <line x1="184" y1="107" x2="228" y2="151" stroke="#A06428" stroke-width="2.2" opacity="0.6"/>
        <!-- diagonal NE-SW -->
        <line x1="242" y1="112" x2="192" y2="162" stroke="#A06428" stroke-width="2.2" opacity="0.6"/>
        <line x1="218" y1="104" x2="162" y2="160" stroke="#A06428" stroke-width="2.2" opacity="0.6"/>
        <line x1="192" y1="100" x2="138" y2="154" stroke="#A06428" stroke-width="2.2" opacity="0.6"/>
        <line x1="165" y1="100" x2="114" y2="151" stroke="#A06428" stroke-width="2.2" opacity="0.6"/>
        <line x1="142" y1="102" x2="92"  y2="152" stroke="#A06428" stroke-width="2.2" opacity="0.6"/>
        <line x1="116" y1="107" x2="70"  y2="153" stroke="#A06428" stroke-width="2.2" opacity="0.6"/>

        <!-- lid rim overlay (clean edge) -->
        <ellipse cx="150" cy="163" rx="112" ry="11" fill="#B87030" opacity="0.6"/>

        <!-- lid knob base -->
        <ellipse cx="150" cy="99" rx="22" ry="9" fill="#B87030"/>
        <!-- lid knob top -->
        <ellipse cx="150" cy="95" rx="16" ry="8" fill="#DEAF7A"/>
        <ellipse cx="150" cy="92" rx="10" ry="6" fill="#C8874A"/>

        <!-- lid shine -->
        <ellipse cx="118" cy="118" rx="26" ry="9" fill="rgba(255,255,255,0.22)" transform="rotate(-22 118 118)"/>
      </g>

    </svg>
  </div>

  <p id="tap-hint">👆 Tap the steamer to open!</p>
  </div><!-- end #steamer-col -->

  <!-- Dumpling guide table -->
  <div id="dumpling-table-wrap">
    <h2>🥟 Dumpling Guide</h2>
    <table id="dumpling-table">
      <thead>
        <tr>
          <th></th>
          <th>Name</th>
          <th>Rarity</th>
        </tr>
      </thead>
      <tbody id="dumpling-table-body"></tbody>
    </table>
  </div>
</div>

<!-- ======= RESULT SCREEN ======= -->
<div id="result-screen">
  <div id="result-dumpling-wrap">
    <svg id="result-dumpling-svg" width="220" height="220" viewBox="0 0 220 220"
         xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div id="dumpling-name">???</div>
  <div id="rarity-badge">Common</div>
  <button class="btn" id="try-again-btn" onclick="tryAgain()">Open Another! 🥟</button>
</div>

<canvas id="fx-canvas"></canvas>

<script>
// ─── DUMPLING TYPES ────────────────────────────────────────────────────────
const DUMPLINGS = [
  {
    id: "sky",
    name: "Sky Dumpling",
    color: "#87CEEB", shade: "#4BA8CC", cheek: "#3E9DBF",
    rarity: "Common", rarityBg: "linear-gradient(135deg,#5BB8D4,#2E86A8)",
    weight: 12, effect: null
  },
  {
    id: "orange",
    name: "Tangerine Dumpling",
    color: "#FF9244", shade: "#E06820", cheek: "#C85010",
    rarity: "Common", rarityBg: "linear-gradient(135deg,#FF8022,#D85000)",
    weight: 12, effect: null
  },
  {
    id: "red",
    name: "Ruby Dumpling",
    color: "#FF4C4C", shade: "#CC1818", cheek: "#AA0000",
    rarity: "Common", rarityBg: "linear-gradient(135deg,#FF3030,#AA0000)",
    weight: 12, effect: null
  },
  {
    id: "darkblue",
    name: "Ocean Dumpling",
    color: "#2566B8", shade: "#0E3D7A", cheek: "#0A2D5E",
    rarity: "Common", rarityBg: "linear-gradient(135deg,#1E5FAA,#082860)",
    weight: 11, effect: null
  },
  {
    id: "purple",
    name: "Violet Dumpling",
    color: "#A855C8", shade: "#6C2488", cheek: "#521870",
    rarity: "Common", rarityBg: "linear-gradient(135deg,#9B40C0,#601880)",
    weight: 11, effect: null
  },
  {
    id: "lightgreen",
    name: "Mint Dumpling",
    color: "#7EDF7E", shade: "#3EAF3E", cheek: "#2A8A2A",
    rarity: "Common", rarityBg: "linear-gradient(135deg,#50CC50,#289028)",
    weight: 11, effect: null
  },
  {
    id: "darkgreen",
    name: "Forest Dumpling",
    color: "#2A8E2A", shade: "#145014", cheek: "#0A360A",
    rarity: "Common", rarityBg: "linear-gradient(135deg,#228B22,#104010)",
    weight: 9, effect: null
  },
  {
    id: "gold",
    name: "Golden Dumpling",
    color: "#FFD700", shade: "#C89000", cheek: "#A07000",
    rarity: "✨ Rare!", rarityBg: "linear-gradient(135deg,#FFD700,#B8860B)",
    weight: 10, effect: "gold",
    particles: ["#FFD700","#FFF8A0","#FFFFFF","#FFE566","#FFEC8B"]
  },
  {
    id: "magic",
    name: "Magic Dumpling",
    color: "#48D1FF", shade: "#FFE030", cheek: "#0090CC",
    rarity: "🌟 Magic!", rarityBg: "linear-gradient(135deg,#AA00FF,#0080FF)",
    weight: 7, effect: "magic",
    particles: ["#48D1FF","#FFE030","#AAEEFF","#FFF8A0","#FFFFFF","#CC88FF"]
  },
  {
    id: "universe",
    name: "Universe Dumpling",
    color: "#8830CC", shade: "#1A1A8A", cheek: "#4A0E8F",
    rarity: "🌌 Universe!", rarityBg: "linear-gradient(135deg,#3D0070,#001080)",
    weight: 5, effect: "universe",
    particles: ["#8830CC","#1A1A8A","#CC88FF","#4488FF","#FFFFFF","#FF99FF"]
  }
];

// ─── WEIGHTED RANDOM ───────────────────────────────────────────────────────
function pickDumpling() {
  const total = DUMPLINGS.reduce((s, d) => s + d.weight, 0);
  let r = Math.random() * total;
  for (const d of DUMPLINGS) {
    r -= d.weight;
    if (r <= 0) return d;
  }
  return DUMPLINGS[0];
}

// ─── BUILD DUMPLING SVG CONTENTS ──────────────────────────────────────────
let _gid = 0; // unique counter so gradient IDs never clash across SVGs
function buildDumpling(d, cx, cy, rad) {
  const c  = d.color;
  const c2 = d.shade;
  const ck = d.cheek;
  const r  = rad;
  const uid = _gid++; // unique suffix for every call

  // gradient / special fill setup
  let defs = '<defs>';
  let bodyFill = c;

  if (d.id === 'universe') {
    defs += `
      <radialGradient id="uniGrad_${uid}" cx="38%" cy="35%" r="65%">
        <stop offset="0%"   stop-color="#AA55EE"/>
        <stop offset="45%"  stop-color="#6020AA"/>
        <stop offset="100%" stop-color="#080030"/>
      </radialGradient>
      <radialGradient id="uniGrad2_${uid}" cx="60%" cy="60%" r="50%">
        <stop offset="0%"   stop-color="#2244BB" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
      </radialGradient>`;
    bodyFill = `url(#uniGrad_${uid})`;
  } else if (d.id === 'gold') {
    defs += `
      <linearGradient id="goldGrad_${uid}" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#FFE566"/>
        <stop offset="40%"  stop-color="#FFD700"/>
        <stop offset="70%"  stop-color="#C89000"/>
        <stop offset="100%" stop-color="#FFD700"/>
      </linearGradient>`;
    bodyFill = `url(#goldGrad_${uid})`;
  } else if (d.id === 'magic') {
    defs += `
      <linearGradient id="magicGrad_${uid}" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#48D1FF"/>
        <stop offset="50%"  stop-color="#AA44FF"/>
        <stop offset="100%" stop-color="#FFE030"/>
      </linearGradient>`;
    bodyFill = `url(#magicGrad_${uid})`;
  } else {
    defs += `
      <linearGradient id="baoGrad_${d.id}_${uid}" x1="20%" y1="0%" x2="80%" y2="100%">
        <stop offset="0%"   stop-color="${c}"/>
        <stop offset="100%" stop-color="${c2}"/>
      </linearGradient>`;
    bodyFill = `url(#baoGrad_${d.id}_${uid})`;
  }
  defs += '</defs>';

  // pleat lines (8 pleats radiating from top)
  const pleats = [...Array(9)].map((_, i) => {
    const angle = (i / 9) * Math.PI * 2 - Math.PI / 2;
    const ix = cx + Math.cos(angle) * r * 0.22;
    const iy = cy - r * 0.38 + Math.sin(angle) * r * 0.1;
    const ox = cx + Math.cos(angle) * r * 0.78;
    const oy = cy + r * 0.25 + Math.sin(angle) * r * 0.32;
    return `<line x1="${ix.toFixed(1)}" y1="${iy.toFixed(1)}" x2="${ox.toFixed(1)}" y2="${oy.toFixed(1)}"
              stroke="${c2}" stroke-width="${(r*0.042).toFixed(1)}" stroke-linecap="round" opacity="0.55"/>`;
  }).join('');

  // universe stars
  const stars = d.id === 'universe' ? `
    <circle cx="${cx-r*.28}" cy="${cy-.05*r}" r="2.2" fill="white" opacity=".85"/>
    <circle cx="${cx+r*.34}" cy="${cy+.12*r}" r="1.6" fill="white" opacity=".9"/>
    <circle cx="${cx-.08*r}" cy="${cy+.32*r}" r="1.1" fill="white" opacity=".7"/>
    <circle cx="${cx+.14*r}" cy="${cy-.28*r}" r="2.6" fill="white" opacity=".6"/>
    <circle cx="${cx-.44*r}" cy="${cy+.24*r}" r="1.4" fill="white" opacity=".8"/>
    <circle cx="${cx+.46*r}" cy="${cy-.12*r}" r="1.0" fill="white" opacity=".9"/>
    <circle cx="${cx+.06*r}" cy="${cy-.18*r}" r="1.8" fill="white" opacity=".55"/>
    <ellipse cx="${cx+.2*r}"  cy="${cy+.22*r}" rx="${r*.18}" ry="${r*.04}" fill="#4488FF" opacity="0.25" transform="rotate(-18 ${cx+.2*r} ${cy+.22*r})"/>
  ` : '';

  // gold sparkle dots
  const sparkles = d.id === 'gold' ? `
    <circle cx="${cx-.30*r}" cy="${cy-.18*r}" r="3" fill="white" opacity=".7"/>
    <circle cx="${cx+.38*r}" cy="${cy-.08*r}" r="2" fill="white" opacity=".6"/>
    <circle cx="${cx+.20*r}" cy="${cy+.30*r}" r="2.5" fill="white" opacity=".5"/>
    <circle cx="${cx-.40*r}" cy="${cy+.18*r}" r="1.8" fill="white" opacity=".65"/>
  ` : '';

  // magic twinkles
  const twinkles = d.id === 'magic' ? `
    <circle cx="${cx-.25*r}" cy="${cy-.15*r}" r="3" fill="#FFFFFF" opacity=".8"/>
    <circle cx="${cx+.30*r}" cy="${cy+.08*r}" r="2.2" fill="#FFE030" opacity=".9"/>
    <circle cx="${cx-.10*r}" cy="${cy+.28*r}" r="2" fill="#48D1FF" opacity=".8"/>
    <circle cx="${cx+.42*r}" cy="${cy-.22*r}" r="1.5" fill="#FFFFFF" opacity=".7"/>
  ` : '';

  return `
    ${defs}
    <!-- drop shadow -->
    <ellipse cx="${cx}" cy="${(cy+r*.88).toFixed(1)}" rx="${(r*.82).toFixed(1)}" ry="${(r*.13).toFixed(1)}" fill="rgba(0,0,0,0.14)"/>

    <!-- body lower dome -->
    <ellipse cx="${cx}" cy="${(cy+r*.22).toFixed(1)}" rx="${(r*.82).toFixed(1)}" ry="${(r*.68).toFixed(1)}" fill="${bodyFill}"/>
    <!-- body upper dome -->
    <ellipse cx="${cx}" cy="${(cy-r*.08).toFixed(1)}" rx="${(r*.70).toFixed(1)}" ry="${(r*.58).toFixed(1)}" fill="${bodyFill}"/>

    <!-- universe overlay blob -->
    ${d.id === 'universe' ? `<ellipse cx="${(cx+r*.1).toFixed(1)}" cy="${(cy+r*.05).toFixed(1)}" rx="${(r*.55).toFixed(1)}" ry="${(r*.50).toFixed(1)}" fill="url(#uniGrad2_${uid})"/>` : ''}

    <!-- pleats -->
    ${pleats}

    <!-- top knot -->
    <ellipse cx="${cx}" cy="${(cy-r*.52).toFixed(1)}" rx="${(r*.20).toFixed(1)}" ry="${(r*.13).toFixed(1)}" fill="${c2}"/>
    <ellipse cx="${cx}" cy="${(cy-r*.60).toFixed(1)}" rx="${(r*.12).toFixed(1)}" ry="${(r*.09).toFixed(1)}" fill="${c}"/>

    <!-- highlights -->
    <ellipse cx="${(cx-r*.24).toFixed(1)}" cy="${(cy-r*.22).toFixed(1)}" rx="${(r*.24).toFixed(1)}" ry="${(r*.14).toFixed(1)}" fill="rgba(255,255,255,0.32)" transform="rotate(-22 ${cx-r*.24} ${cy-r*.22})"/>
    <ellipse cx="${(cx-r*.18).toFixed(1)}" cy="${(cy-r*.38).toFixed(1)}" rx="${(r*.10).toFixed(1)}" ry="${(r*.06).toFixed(1)}" fill="rgba(255,255,255,0.22)" transform="rotate(-15 ${cx-r*.18} ${cy-r*.38})"/>

    <!-- special detail overlays -->
    ${stars}${sparkles}${twinkles}

    <!-- LEFT EYE -->
    <ellipse cx="${(cx-r*.22).toFixed(1)}" cy="${(cy+r*.20).toFixed(1)}" rx="${(r*.110).toFixed(1)}" ry="${(r*.130).toFixed(1)}" fill="#1A1A1A"/>
    <circle  cx="${(cx-r*.16).toFixed(1)}" cy="${(cy+r*.14).toFixed(1)}" r="${(r*.042).toFixed(1)}" fill="white"/>
    <!-- RIGHT EYE -->
    <ellipse cx="${(cx+r*.22).toFixed(1)}" cy="${(cy+r*.20).toFixed(1)}" rx="${(r*.110).toFixed(1)}" ry="${(r*.130).toFixed(1)}" fill="#1A1A1A"/>
    <circle  cx="${(cx+r*.28).toFixed(1)}" cy="${(cy+r*.14).toFixed(1)}" r="${(r*.042).toFixed(1)}" fill="white"/>

    <!-- SMILE -->
    <path d="M ${(cx-r*.20).toFixed(1)} ${(cy+r*.36).toFixed(1)}
             Q ${cx} ${(cy+r*.54).toFixed(1)}
               ${(cx+r*.20).toFixed(1)} ${(cy+r*.36).toFixed(1)}"
          stroke="#1A1A1A" stroke-width="${(r*.055).toFixed(1)}" fill="none" stroke-linecap="round"/>

    <!-- CHEEKS -->
    <ellipse cx="${(cx-r*.33).toFixed(1)}" cy="${(cy+r*.40).toFixed(1)}" rx="${(r*.145).toFixed(1)}" ry="${(r*.082).toFixed(1)}" fill="${ck}" opacity="0.52"/>
    <ellipse cx="${(cx+r*.33).toFixed(1)}" cy="${(cy+r*.40).toFixed(1)}" rx="${(r*.145).toFixed(1)}" ry="${(r*.082).toFixed(1)}" fill="${ck}" opacity="0.52"/>
    <!-- cheek dots -->
    <circle cx="${(cx-r*.38).toFixed(1)}" cy="${(cy+r*.44).toFixed(1)}" r="${(r*.030).toFixed(1)}" fill="${ck}" opacity="0.80"/>
    <circle cx="${(cx-r*.28).toFixed(1)}" cy="${(cy+r*.46).toFixed(1)}" r="${(r*.025).toFixed(1)}" fill="${ck}" opacity="0.80"/>
    <circle cx="${(cx+r*.38).toFixed(1)}" cy="${(cy+r*.44).toFixed(1)}" r="${(r*.030).toFixed(1)}" fill="${ck}" opacity="0.80"/>
    <circle cx="${(cx+r*.28).toFixed(1)}" cy="${(cy+r*.46).toFixed(1)}" r="${(r*.025).toFixed(1)}" fill="${ck}" opacity="0.80"/>
  `;
}

// ─── BUILD DUMPLING TABLE ──────────────────────────────────────────────────
function buildTable() {
  const tbody = document.getElementById('dumpling-table-body');
  const total = DUMPLINGS.reduce((s, d) => s + d.weight, 0);
  tbody.innerHTML = '';
  for (const d of DUMPLINGS) {
    const chance = ((d.weight / total) * 100).toFixed(1) + '%';
    // Mini 44×44 SVG icon of the dumpling
    const iconSvg = `<svg width="44" height="44" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">${buildDumpling(d, 22, 20, 17)}</svg>`;
    // Glow style for special ones
    let iconStyle = '';
    if (d.effect === 'gold')     iconStyle = 'filter:drop-shadow(0 0 4px #FFD700)';
    if (d.effect === 'magic')    iconStyle = 'filter:drop-shadow(0 0 4px #44C8FF)';
    if (d.effect === 'universe') iconStyle = 'filter:drop-shadow(0 0 4px #9B59B6)';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="dt-icon"><div style="${iconStyle}">${iconSvg}</div></td>
      <td class="dt-name">${d.name}</td>
      <td><span class="dt-badge" style="background:${d.rarityBg}">${d.rarity}</span></td>
    `;
    tbody.appendChild(tr);
  }
}

// ─── STATE ─────────────────────────────────────────────────────────────────
let isOpen   = false;
let openCount = 0;

// ─── OPEN THE STEAMER ──────────────────────────────────────────────────────
function openSteamer() {
  if (isOpen) return;
  isOpen = true;
  openCount++;
  document.getElementById('open-count').textContent = openCount;

  // swing lid open
  document.getElementById('lid-group').classList.add('open');

  const chosen = pickDumpling();

  setTimeout(() => {
    // switch screens
    document.getElementById('start-screen').style.display  = 'none';
    document.getElementById('result-screen').style.display = 'flex';

    // build the result SVG
    const svg = document.getElementById('result-dumpling-svg');
    svg.innerHTML = buildDumpling(chosen, 110, 100, 82);

    // apply glow class
    svg.className = '';
    if      (chosen.effect === 'gold')     svg.classList.add('glow-gold');
    else if (chosen.effect === 'magic')    svg.classList.add('glow-magic');
    else if (chosen.effect === 'universe') svg.classList.add('glow-universe');
    else                                   svg.classList.add('dumpling-reveal');

    // name & badge
    document.getElementById('dumpling-name').textContent = chosen.name;
    const badge = document.getElementById('rarity-badge');
    badge.textContent        = chosen.rarity;
    badge.style.background   = chosen.rarityBg;

    // particles for special ones
    if (chosen.particles) spawnParticles(chosen);

  }, 480);
}

// ─── TRY AGAIN ─────────────────────────────────────────────────────────────
function tryAgain() {
  isOpen = false;
  document.getElementById('lid-group').classList.remove('open');
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').style.display  = 'flex';
  const svg = document.getElementById('result-dumpling-svg');
  svg.className = '';
  svg.innerHTML = '';
}

// ─── PARTICLE FX ───────────────────────────────────────────────────────────
function spawnParticles(d) {
  const canvas = document.getElementById('fx-canvas');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx    = canvas.getContext('2d');
  const cols   = d.particles;
  const isGold = d.effect === 'gold' || d.effect === 'magic';

  const pts = Array.from({ length: 90 }, () => ({
    x:    Math.random() * canvas.width,
    y:    -12 - Math.random() * 60,
    vx:   (Math.random() - 0.5) * 2.8,
    vy:   1.8 + Math.random() * 3.2,
    r:    3 + Math.random() * 6,
    col:  cols[Math.floor(Math.random() * cols.length)],
    rot:  Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 0.18,
    life: 1
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of pts) {
      p.x   += p.vx;
      p.y   += p.vy;
      p.rot += p.rotV;
      p.life -= 0.007;
      if (p.life <= 0 || p.y > canvas.height) continue;
      alive = true;
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.col;
      if (isGold) {
        // star shape
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
          const b = ((i * 4 + 2) * Math.PI) / 5 - Math.PI / 2;
          ctx.lineTo(Math.cos(a) * p.r,       Math.sin(a) * p.r);
          ctx.lineTo(Math.cos(b) * p.r * 0.42, Math.sin(b) * p.r * 0.42);
        }
        ctx.closePath();
      } else {
        // circles / dots for universe
        ctx.beginPath();
        ctx.arc(0, 0, p.r, 0, Math.PI * 2);
      }
      ctx.fill();
      ctx.restore();
    }
    if (alive) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

// Build the table on page load
buildTable();
</script>
